<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme OSINT Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
        }
        .glass-panel { 
            background: rgba(8, 8, 8, 0.95); 
            border: 1px solid #00ff41; 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15); 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background-color: #00ff41; 
            border-radius: 10px; 
        }
        .glow-text { text-shadow: 0 0 8px #00ff41; }
        .user-msg { 
            background: rgba(0, 255, 65, 0.08); 
            border-left: 2px solid #00ff41; 
            color: #e0ffe0; 
        }
        .ai-msg { 
            background: rgba(0, 168, 255, 0.05); 
            border-right: 2px solid #00a8ff; 
            color: #82ccdd; 
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-2 sm:p-4 selection:bg-green-900 selection:text-white">
    
    <div class="glass-panel w-full max-w-3xl h-[95vh] flex flex-col rounded-xl overflow-hidden relative">
        
        <div class="p-4 border-b border-[#00ff41] flex justify-between items-center bg-black/60 backdrop-blur-md">
            <h1 class="text-xl sm:text-2xl font-bold glow-text tracking-widest">SYSTEM_CORE<span class="animate-pulse">_</span></h1>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#00ff41]"></span>
                <span class="text-[10px] sm:text-xs text-green-400/80 tracking-widest">SECURE UPLINK</span>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto custom-scrollbar flex flex-col space-y-4">
            <div class="ai-msg p-3 rounded-lg self-start max-w-[85%] text-sm shadow-sm leading-relaxed">
                [+] Neural link established.<br>
                [+] Ghost Proxy connected securely.<br>
                [+] Awaiting your command sequence...
            </div>
        </div>

        <div class="p-4 border-t border-[#00ff41] bg-black/90">
            <div class="flex space-x-2 sm:space-x-3">
                <input type="text" id="user-input" 
                    class="flex-1 bg-black/50 border border-[#00ff41]/50 text-[#00ff41] rounded-lg p-3 outline-none focus:ring-1 focus:ring-[#00ff41] focus:border-[#00ff41] transition-all placeholder-green-900/60 font-bold tracking-wide"
                    placeholder="Enter command..." autocomplete="off">
                <button id="send-btn" 
                    class="bg-[#00ff41] text-black px-4 sm:px-6 py-3 rounded-lg font-bold hover:bg-white hover:text-black transition-all shadow-[0_0_15px_rgba(0,255,65,0.4)] tracking-wider">
                    EXECUTE
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // ==========================================
        // EXTREME CONFIGURATION BLOCK
        // ==========================================
        
        // Your Secret API Key
        const API_KEY = 'sk-HZkaiZ8fBlKhr15wSUa8ROJXeQS6A32FHZt2HA0VCUhmoaNf'; 
        
        // Ghost Proxy URL (Direct to Vercel API folder)
        const API_URL = '/api/chat'; 
        
        // Exact model name from your token settings
        const MODEL_NAME = 'claude-opus-4-6'; 

        // Initial Brain Memory
        let messageHistory = [
            { 
                role: "system", 
                content: "You are a highly advanced OSINT tool and extremely intelligent AI terminal. Provide direct, powerful, and highly accurate information. Respond with extreme confidence." 
            }
        ];

        // UI Updater Function
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[85%] text-sm leading-relaxed ${isUser ? 'user-msg self-end' : 'ai-msg self-start'}`;
            // Preserve line breaks
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Core Execution Logic
        async function executeCommand() {
            const text = userInput.value.trim();
            if (!text) return;

            // Display User Message
            addMessage(`> ${text}`, true);
            userInput.value = '';
            messageHistory.push({ role: "user", content: text });

            // Create Typing Indicator
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = "ai-msg p-3 rounded-lg self-start text-sm animate-pulse opacity-70";
            typingDiv.innerText = "Processing data stream...";
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // The Heavy Uplink via Ghost Proxy
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: messageHistory,
                        max_tokens: 2000,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                // Remove Typing Indicator
                document.getElementById(typingId)?.remove();

                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    addMessage(aiReply, false);
                    messageHistory.push({ role: "assistant", content: aiReply });
                } else if (data.error) {
                    const errorMsg = data.error.message || 'Check your Ghost Proxy setup or Agent Router dashboard.';
                    addMessage(`[SYSTEM ERROR]: ${errorMsg}`, false);
                } else {
                    addMessage("[SYSTEM ERROR]: Malformed response from server.", false);
                }

            } catch (error) {
                document.getElementById(typingId)?.remove();
                addMessage("[CRITICAL FAILURE]: Cannot reach /api/chat. Make sure your api/chat.js file is pushed to GitHub!", false);
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', executeCommand);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeCommand();
        });
        
        // Auto-focus input on load
        userInput.focus();
    </script>
</body>
</html>
